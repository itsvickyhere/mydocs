# ─── App ───────────────────────────────────────────
spring.application.name=mydocs-backend
server.port=8080

# ─── H2 In-Memory Database (dev) ───────────────────
spring.datasource.url=jdbc:h2:mem:mydocsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console — open http://localhost:8080/h2-console in browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ───────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── File Upload ────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ─── CORS (allow React dev server) ─────────────────
# Handled in CorsConfig.java

